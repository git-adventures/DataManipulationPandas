<svg width="760" height="450" xmlns="http://www.w3.org/2000/svg" font-family="monospace">

  <!-- Background -->
  <rect width="760" height="450" fill="#0f0f0f"/>

  <!-- Title -->
  <text x="380" y="35" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Database Migration Tool — Flow</text>

  <!-- Box 1: CLI -->
  <rect x="30" y="65" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#4f8ef7" stroke-width="2"/>
  <text x="95" y="91" text-anchor="middle" fill="#4f8ef7" font-size="13" font-weight="bold">CLI</text>
  <text x="95" y="111" text-anchor="middle" fill="#aaaaaa" font-size="11">main.py --args</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="95" x2="225" y2="95" stroke="#4f8ef7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="192" y="88" text-anchor="middle" fill="#666" font-size="10">parses</text>

  <!-- Box 2: connector -->
  <rect x="225" y="65" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="305" y="91" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">connector.py</text>
  <text x="305" y="111" text-anchor="middle" fill="#aaaaaa" font-size="11">src + tgt engines</text>

  <!-- Arrow 2 -->
  <line x1="385" y1="95" x2="450" y2="95" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="417" y="88" text-anchor="middle" fill="#666" font-size="10">calls</text>

  <!-- Box 3: migrator -->
  <rect x="450" y="65" width="270" height="60" rx="8" fill="#1a1a2e" stroke="#34d399" stroke-width="2"/>
  <text x="585" y="91" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">migrator.py</text>
  <text x="585" y="111" text-anchor="middle" fill="#aaaaaa" font-size="11">migrate(src, tgt, src_db, tgt_db)</text>

  <!-- Arrow down from migrator to pipeline -->
  <line x1="585" y1="125" x2="585" y2="168" stroke="#34d399" stroke-width="2"/>
  <line x1="585" y1="168" x2="380" y2="168" stroke="#34d399" stroke-width="2"/>
  <line x1="380" y1="168" x2="380" y2="183" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pipeline strip -->
  <rect x="30" y="183" width="700" height="55" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="380" y="202" text-anchor="middle" fill="#9ca3af" font-size="11">per-table pipeline</text>

  <text x="75"  y="222" text-anchor="middle" fill="#34d399" font-size="11">inspect()</text>
  <text x="185" y="222" text-anchor="middle" fill="#34d399" font-size="11">map_type()</text>
  <text x="305" y="222" text-anchor="middle" fill="#34d399" font-size="11">create_table()</text>
  <text x="430" y="222" text-anchor="middle" fill="#34d399" font-size="11">read_chunks()</text>
  <text x="570" y="222" text-anchor="middle" fill="#34d399" font-size="11">to_sql()</text>
  <text x="680" y="222" text-anchor="middle" fill="#34d399" font-size="11">done</text>

  <!-- Arrows between pipeline steps -->
  <text x="127" y="225" fill="#555" font-size="11">→</text>
  <text x="244" y="225" fill="#555" font-size="11">→</text>
  <text x="368" y="225" fill="#555" font-size="11">→</text>
  <text x="498" y="225" fill="#555" font-size="11">→</text>
  <text x="625" y="225" fill="#555" font-size="11">→</text>

  <!-- Arrow down from pipeline -->
  <line x1="380" y1="238" x2="380" y2="288" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Box 4: tracker -->
  <rect x="100" y="288" width="200" height="60" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="314" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">MigrationTracker</text>
  <text x="200" y="334" text-anchor="middle" fill="#aaaaaa" font-size="11">tqdm progress bar</text>

  <!-- Box 5: rollback -->
  <rect x="460" y="288" width="200" height="60" rx="8" fill="#1a1a2e" stroke="#f87171" stroke-width="2"/>
  <text x="560" y="314" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">rollback()</text>
  <text x="560" y="334" text-anchor="middle" fill="#aaaaaa" font-size="11">DROP completed tables</text>

  <!-- Line connecting tracker and rollback -->
  <line x1="300" y1="318" x2="460" y2="318" stroke="#4b5563" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="380" y="312" text-anchor="middle" fill="#4b5563" font-size="10">on failure</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="380" y="415" text-anchor="middle" fill="#4b5563" font-size="11">CLI → connector → migrator → [inspect → map → create → chunk → write] → tracker / rollback</text>

</svg>
