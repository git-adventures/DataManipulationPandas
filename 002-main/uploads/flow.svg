<svg width="740" height="460" xmlns="http://www.w3.org/2000/svg" font-family="monospace">

  <!-- Background -->
  <rect width="740" height="460" fill="#0f0f0f"/>

  <!-- Title -->
  <text x="370" y="35" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Excel Report Generator — Flask Flow</text>

  <!-- Box 1: Browser -->
  <rect x="20" y="70" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#4f8ef7" stroke-width="2"/>
  <text x="85" y="97" text-anchor="middle" fill="#4f8ef7" font-size="13" font-weight="bold">Browser</text>
  <text x="85" y="117" text-anchor="middle" fill="#aaaaaa" font-size="11">Upload CSV</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="100" x2="220" y2="100" stroke="#4f8ef7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="93" text-anchor="middle" fill="#666" font-size="10">POST /generate</text>

  <!-- Box 2: Flask -->
  <rect x="220" y="70" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="285" y="97" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">Flask</text>
  <text x="285" y="117" text-anchor="middle" fill="#aaaaaa" font-size="11">app.py</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="100" x2="420" y2="100" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="385" y="93" text-anchor="middle" fill="#666" font-size="10">calls</text>

  <!-- Box 3: Report Template -->
  <rect x="420" y="70" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#34d399" stroke-width="2"/>
  <text x="500" y="95" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">Report Template</text>
  <text x="500" y="115" text-anchor="middle" fill="#aaaaaa" font-size="11">sales / financial / inventory</text>

  <!-- Arrow down from Flask to DataLoader -->
  <line x1="285" y1="130" x2="285" y2="175" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pipeline box -->
  <rect x="20" y="175" width="700" height="55" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="370" y="196" text-anchor="middle" fill="#9ca3af" font-size="11">DataLoader pipeline</text>

  <text x="75"  y="216" text-anchor="middle" fill="#34d399" font-size="11">read_csv()</text>
  <text x="190" y="216" text-anchor="middle" fill="#34d399" font-size="11">validate()</text>
  <text x="310" y="216" text-anchor="middle" fill="#34d399" font-size="11">normalize()</text>
  <text x="440" y="216" text-anchor="middle" fill="#34d399" font-size="11">pivot_table()</text>
  <text x="580" y="216" text-anchor="middle" fill="#34d399" font-size="11">write_excel()</text>
  <text x="680" y="216" text-anchor="middle" fill="#34d399" font-size="11">charts()</text>

  <!-- Step arrows -->
  <text x="132" y="219" fill="#555" font-size="11">→</text>
  <text x="247" y="219" fill="#555" font-size="11">→</text>
  <text x="370" y="219" fill="#555" font-size="11">→</text>
  <text x="502" y="219" fill="#555" font-size="11">→</text>
  <text x="630" y="219" fill="#555" font-size="11">→</text>

  <!-- Arrow down from pipeline -->
  <line x1="370" y1="230" x2="370" y2="285" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Box 4: report.xlsx -->
  <rect x="245" y="285" width="250" height="60" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="311" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">report.xlsx</text>
  <text x="370" y="331" text-anchor="middle" fill="#aaaaaa" font-size="11">pivots · formatting · charts</text>

  <!-- Arrow right to download -->
  <line x1="495" y1="315" x2="565" y2="315" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Box 5: Download -->
  <rect x="565" y="285" width="150" height="60" rx="8" fill="#1a1a2e" stroke="#f87171" stroke-width="2"/>
  <text x="640" y="311" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">Download</text>
  <text x="640" y="331" text-anchor="middle" fill="#aaaaaa" font-size="11">GET /download</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="370" y="420" text-anchor="middle" fill="#4b5563" font-size="11">Browser → Flask → DataLoader → ExcelWriter → report.xlsx → Download</text>

</svg>
